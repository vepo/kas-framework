services:
  test-stream:
    image: vepo/openjdk:21-jdk
    command: java -jar /app/sample-stream-jar-with-dependencies.jar
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6gb
        reservations:
          cpus: '0.5'
          memory: 5gb
    environment:
      STATS_FOLDER: /app-stats
    volumes:
      - ./runtime:/app
      - ./stats:/app-stats
    networks:
      - adaptive-network
    extra_hosts:
      kafka-0: 201.23.0.209
      kafka-1: 201.23.0.209
      kafka-2: 201.23.0.209
      producer: 201.23.0.209
networks:
  adaptive-network:
    ## local
    ##external: true
    ## cloud
    name: adaptive-network
    driver: bridge